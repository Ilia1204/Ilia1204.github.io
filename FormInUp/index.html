<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма входа</title>
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/normalize.css">
</head>
<body>
    <div class="container">
        <form class="form">
            <div class="action">
                <div class="dws-input">
                    <input type="email" name="username" placeholder="Email Address" required>
                </div>
                <div class="dws-input">
                    <input type="password" class = "password" name="password" placeholder="Password"required><br />
                <label>
                    <input type="checkbox" class="showPassword"><span class="link1"> Показать пароль</span>
                </label>
                </div> 
                <div class="buttons">
                    <div class="btn">
                        <input class="button" type="submit" name="submit" value="Sign In"><br />
                    </div>
                        <input class="button" type="submit" name="submit" value="Sign Up"><br />
                </div>
                <div class="forgot">
                    <a href="#">
                        <span class="link">
                            Forgot password?
                        </span>
                    </a>
                </div>
                <div class="register">
                    <a href="register-form.html">
                        <span class="link-now">
                            Register now
                        </span>
                    </a>
                      
                </div>
            </div> 
        </form>
            <div class="form-with-img"></div>
    </div>    
        <script src="./js/jquery-3.5.1.min.js"></script>
        <script src="./js/index.js"></script> 
</body>
</html>
